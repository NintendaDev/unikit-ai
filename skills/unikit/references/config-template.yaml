# UniKit Configuration
# This file configures unikit behavior for your project.
# All sections are optional — defaults are used when not specified.
#
# Generated by /unikit bootstrap. Safe to edit manually.
# Skills read this file at the start of every command (Step 0).

# =============================================================================
# Language Settings
# =============================================================================
# Controls the language used in AI-generated content and communication.

language:
  # Language for AI-agent communication (prompts, questions, explanations).
  # Options: en, ru, de, fr, es, zh, ja, ko, pt, it
  # Default: en
  ui: {{LANGUAGE_UI}}

  # Language for generated artifacts (plans, specs, documentation).
  # Options: en, ru, de, fr, es, zh, ja, ko, pt, it
  # Default: en (same as ui if not specified)
  artifacts: {{LANGUAGE_ARTIFACTS}}

  # Language for knowledge base rule files: everything under .unikit/memory/
  # (core/, stack/, references/, RULES_INDEX.md), .unikit/RULES.md, and
  # skill-context rules.
  #
  # Options: en, ru, de, fr, es, zh, ja, ko, pt, it
  # Default: en
  #
  # This key is INTENTIONALLY decoupled from `language.ui` and
  # `language.artifacts`. Rule files are consumed by AI agents for prompt
  # matching and instruction following; keeping them in a stable language
  # (typically English) reduces semantic drift across agents and teams.
  # Changing `language.ui` or `language.artifacts` does NOT change the
  # language of existing rule files.
  #
  # SKILLS NEVER TOUCH THIS KEY. It is manually edited only. `/unikit` and
  # `/unikit-memory` read it to decide what language to write new rule
  # prose in; they never write to it, never prompt for it, and never
  # suggest changing it. To localize rules, edit this file by hand, then
  # regenerate or manually translate existing files under .unikit/memory/.
  rules: en

  # How to handle technical terms in translations.
  # Options:
  #   - keep: preserve original English terms (API, prefab, shader, ECS, etc.)
  #   - translate: translate where common translation exists
  # Default: keep
  technical_terms: keep

# =============================================================================
# Workflow Settings
# =============================================================================
# Controls unikit workflow behavior.

workflow:
  # Maximum age (in days) for research notes to be considered "fresh"
  # by /unikit-plan when reusing existing research.
  # Older research is flagged as stale and a refresh is suggested.
  # Default: 30
  research_relevance_days: 7

# =============================================================================
# Git Settings
# =============================================================================

git:
  # Whether this project uses git-aware workflows.
  # If false:
  #   - /unikit-plan full does not create branches
  #   - /unikit-review and /unikit-verify do not assume a base branch exists
  #   - merge/push guidance is skipped
  # Default: auto-detected from the repository (.git presence)
  enabled: {{GIT_ENABLED}}

  # Default branch for diff/review/merge targets.
  # Examples: main, master, develop, trunk, 2.x
  # Default: auto-detected from git metadata, fallback main
  base_branch: {{GIT_BASE_BRANCH}}

  # Automatically create feature branches for plans.
  # Applies only when git.enabled = true.
  # If false, /unikit-plan full still creates a full plan but stays
  # on the current branch (or uses a slug-named full plan in no-git mode).
  # Default: true when git is enabled
  create_branches: true

  # Branch name prefix for new features.
  # Applies only when create_branches = true.
  # Default: feature/
  branch_prefix: feature/

  # Skip push prompt after /unikit-commit creates a commit.
  # If true:
  #   - /unikit-commit ends after successful local commit
  #   - no "Push to remote?" prompt is shown
  # Default: false
  skip_push_after_commit: false
