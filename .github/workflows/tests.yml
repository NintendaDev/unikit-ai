name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, development]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '22']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Download rules repository
        run: npm run download:rules

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Validate skills
        run: npm test
